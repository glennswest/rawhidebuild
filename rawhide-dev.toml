name = "rawhide-dev"
description = "Fedora Rawhide development workstation with Go, Rust, and kernel dev tools"
version = "0.1.0"
distro = "fedora-rawhide"

# --- Packages ---

# Core system
[[packages]]
name = "openssh-server"

[[packages]]
name = "openssh-clients"

[[packages]]
name = "chrony"

[[packages]]
name = "vim-enhanced"

[[packages]]
name = "tmux"

[[packages]]
name = "git"

[[packages]]
name = "rsync"

[[packages]]
name = "htop"

[[packages]]
name = "curl"

[[packages]]
name = "wget"

[[packages]]
name = "jq"

[[packages]]
name = "strace"

[[packages]]
name = "ltrace"

[[packages]]
name = "perf"

[[packages]]
name = "bpftrace"

# Rust toolchain (distro packages — rustup installed in post)
[[packages]]
name = "rust"

[[packages]]
name = "cargo"

[[packages]]
name = "rustfmt"

[[packages]]
name = "clippy"

[[packages]]
name = "rust-src"

[[packages]]
name = "rust-std-static"

# Go toolchain
[[packages]]
name = "golang"

[[packages]]
name = "golang-bin"

# C/C++ toolchain
[[packages]]
name = "gcc"

[[packages]]
name = "gcc-c++"

[[packages]]
name = "clang"

[[packages]]
name = "llvm"

[[packages]]
name = "lld"

[[packages]]
name = "cmake"

[[packages]]
name = "meson"

[[packages]]
name = "ninja-build"

[[packages]]
name = "autoconf"

[[packages]]
name = "automake"

[[packages]]
name = "libtool"

[[packages]]
name = "pkgconf"

[[packages]]
name = "make"

[[packages]]
name = "patch"

# Kernel development
[[packages]]
name = "kernel-devel"

[[packages]]
name = "kernel-headers"

[[packages]]
name = "kernel-modules-extra"

[[packages]]
name = "elfutils-libelf-devel"

[[packages]]
name = "dwarves"

[[packages]]
name = "bc"

[[packages]]
name = "flex"

[[packages]]
name = "bison"

[[packages]]
name = "sparse"

[[packages]]
name = "cscope"

[[packages]]
name = "ctags"

# Libraries
[[packages]]
name = "glibc-devel"

[[packages]]
name = "glibc-static"

[[packages]]
name = "musl-libc"

[[packages]]
name = "musl-gcc"

[[packages]]
name = "liburing-devel"

[[packages]]
name = "openssl-devel"

[[packages]]
name = "zlib-devel"

[[packages]]
name = "libffi-devel"

[[packages]]
name = "sqlite-devel"

[[packages]]
name = "bzip2-devel"

[[packages]]
name = "xz-devel"

[[packages]]
name = "readline-devel"

[[packages]]
name = "ncurses-devel"

# iSCSI
[[packages]]
name = "iscsi-initiator-utils"

# --- SSH ---

[customizations.services]
enabled = ["sshd", "chronyd"]

[customizations.firewall]
ports = ["22:tcp"]

# CloudID fetches SSH keys at boot via kickstart
# Root login enabled for key-based access
[customizations.kernel]
append = "console=tty0 console=ttyS0,115200 console=ttyS1,115200"
